<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Peças Agrícolas</title>
    <link rel="stylesheet" href="css/clientes.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <nav class="top-nav">
            <div class="brand">
                <img src="assets/logoRj.jpeg" alt="Logo">
                <strong>RJ - PEÇAS AGRÍCOLAS</strong>
            </div>
            <div class="user">
                <span id="nomeUsuarioLogado">Carregando...</span> 
                <a href="index.html" class="logout-link" onclick="localStorage.removeItem('usuarioLogado')">Sair</a>
            </div>
        </nav>

        <div class="tabs-bar" id="menuNavegacao">
            </div>

        <main class="main-content">
            <div class="inventory-card">
                <div class="inventory-header">
                    <h2>Gerenciamento de Clientes</h2>
                    <button class="btn-add" onclick="abrirModalCliente()">+ Novo Cliente</button>
                </div>

                <input type="text" id="buscaCliente" class="search-box" placeholder="Pesquisar por nome ou CPF/CNPJ..." oninput="buscarClientes()">

                <table id="tabelaClientes">
                    <thead>
                        <tr>
                            <th>NOME</th>
                            <th>CONTATO</th>
                            <th>DOCUMENTO (CPF/CNPJ)</th>
                            <th>CIDADE/ESTADO</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="corpoClientes">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modalCliente" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h2 id="tituloModal">Novo Cliente</h2>
            <form id="formCliente" onsubmit="salvarCliente(event)">
                
                <div class="input-group">
                    <label>Nome / Empresa *</label>
                    <input type="text" id="nomeCliente" required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>CPF/CNPJ *</label>
                        <input type="text" id="docCliente" maxlength="18" required placeholder="000.000.000-00">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Telefone *</label>
                        <input type="text" id="telCliente" maxlength="15" required placeholder="(34) 90000-0000">
                        <small style="color: var(--prata-aluminio); font-size: 10px; margin-top: 4px; display: block;">
                            Não esqueça de incluir o DDD.
                        </small>
                    </div>
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="emailCliente" placeholder="contato@cliente.com">
                </div>

                <div class="input-group">
                    <label>Endereço Completo</label>
                    <input type="text" id="endCliente" placeholder="Rua, Número, Bairro">
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 2;">
                        <label>Cidade</label>
                        <input type="text" id="cidadeCliente">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Estado (UF)</label>
                        <input type="text" id="ufCliente" placeholder="Ex: SP" maxlength="2">
                    </div>
                </div>

                <div class="input-group">
                    <label>Observações</label>
                    <textarea id="obsCliente" rows="3" placeholder="Detalhes adicionais de contato ou negócio..."></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="fecharModalCliente()">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar Cliente</button>
                </div>
            </form>
        </div>
    </div>
    <script src="js/clientes-logic.js"></script>
</body>
</html>
